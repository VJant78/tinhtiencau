<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Tính tiền cầu</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f7f7f7; padding:20px }
    table { border-collapse: collapse; width:100%; margin-bottom:20px; background:#fff }
    th, td { border:1px solid #ccc; padding:6px 8px; text-align:center }
    th { background:#e9f5e1 }
    h2 { margin-top:30px }
    input, select { width:10%; box-sizing:border-box }
    input.extra { width:100% }
    .btn { padding:8px 16px; cursor:pointer }
    .note { background:#fff3cd; padding:10px; margin-bottom:20px }
  </style>
</head>
<body>

<h2>1. Tổng chi</h2>
<div style="display:flex; gap:10px; margin-bottom:10px; align-items:center">
  <div>Ngày:</div>
  <input id="calcDate" type="text" list="dateList" placeholder="VD: 11/2/2025 1" style="width:180px">
  <datalist id="dateList"></datalist>
</div>
<div style="display:flex; gap:10px; margin-bottom:10px">
  <select id="itemType">
    <option value="San">Sân</option>
    <option value="Cau">Cầu</option>
    <option value="Tea">Trà đá</option>
    <option value="Other">Khác</option>
  </select>
  <button class="btn" onclick="addExpense()">+ Thêm mặt hàng</button>
</div>
<table id="expenseTable">
  <tr>
    <th>Mặt hàng</th>
    <th>Giá tiền</th>
    <th>Số lượng</th>
    <th>Thành tiền</th>
    <th></th>
  </tr>
</table>


<div class="note">
  Số lượng người chơi: <input id="playerCount" value="0" style="width:80px">
</div>

<h2>2. Thành viên</h2>
<div style="display:flex; gap:10px">
  <input type="text" id="newName" placeholder="Tên thành viên">
  <select id="newJoin">
    <option value="Y">Y</option>
    <option value="N">N</option>
  </select>
  <button class="btn" onclick="addMember()">Thêm</button>
</div>
<table id="memberTable">
  <caption style="caption-side:top; text-align:left; padding:8px 0">
    <button class="btn" type="button" onclick="completeCalculation()">Hoàn thành</button>
    <button class="btn" type="button" onclick="clearAllData()" style="margin-left:8px">Clear</button>
  </caption>
  <tr>
    <th>Thành viên</th>
    <th>Giờ chơi</th>
    <th>Lên sân (Y/N)</th>
    <th>Tiền sân</th>
    <th>Tiền cầu</th>
    <th>Trà đá</th>
    <th>Khác</th>
    <th>Phát sinh</th>
    <th>Tổng</th>
	<th></th>
  </tr>
</table>

<script>
const expenses = [];

let jsonFileHandle = null;
const DATA_JSON_URL = './data.json';
const SAVE_ENDPOINT_URL = './save.php';

let dataStore = { days: [] };

document.addEventListener('DOMContentLoaded', () => {
  loadDataFromJson();

  calcDate.addEventListener('change', () => {
    const selected = normalizeDayKey(calcDate.value);
    if (!selected) return;
    loadDayToUI(selected);
  });
});

async function loadDataFromJson() {
  try {
    const res = await fetch(DATA_JSON_URL, { cache: 'no-store' });
    if (!res.ok) {
      // Nếu file chưa tồn tại (404) thì khởi tạo rỗng và cho phép user lưu để tạo lại file.
      if (res.status === 404) {
        dataStore = { days: [] };
        syncDateList();

        const initialDate = pickInitialDate();
        calcDate.value = initialDate;
        loadDayToUI(initialDate);
        return;
      }
      throw new Error(`HTTP ${res.status}`);
    }
    const data = await res.json();
    dataStore = normalizeDataStore(data);
    syncDateList();

    const initialDate = pickInitialDate();
    calcDate.value = initialDate;
    loadDayToUI(initialDate);
  } catch (err) {
    // Khi mở bằng file:// thường không fetch được file cục bộ.
    console.warn('Không load được data.json. Nếu chạy qua Apache/PHP, file sẽ được tạo lại khi bấm Hoàn thành/Clear.', err);

    dataStore = { days: [] };
    syncDateList();

    // Fallback: vẫn set ngày hôm nay để user nhập.
    const today = normalizeDayKey(new Date().toISOString().slice(0, 10));
    calcDate.value = today;
  }
}

function normalizeDayKey(value) {
  const v = (value || '').toString().trim().replace(/\s+/g, ' ');
  if (!v) return '';
  // Hard cap to keep JSON reasonable
  return v.length > 100 ? v.slice(0, 100) : v;
}

function normalizeDataStore(data) {
  // New format: { days: [ { date, expenses, members } ] }
  if (data && typeof data === 'object' && Array.isArray(data.days)) {
    return {
      days: data.days
        .filter(d => d && typeof d === 'object')
        .map(d => ({
          date: normalizeDayKey(d.date),
          expenses: Array.isArray(d.expenses) ? d.expenses : [],
          members: Array.isArray(d.members) ? d.members : []
        }))
        .filter(d => d.date)
    };
  }

  // Old format (backward compatible): { expenses: [...], members: [...] }
  if (data && typeof data === 'object' && (Array.isArray(data.expenses) || Array.isArray(data.members))) {
    const today = normalizeDayKey(new Date().toISOString().slice(0, 10));
    return {
      days: [
        {
          date: today,
          expenses: Array.isArray(data.expenses) ? data.expenses : [],
          members: Array.isArray(data.members) ? data.members : []
        }
      ]
    };
  }

  return { days: [] };
}

function pickInitialDate() {
  const today = normalizeDayKey(new Date().toISOString().slice(0, 10));
  if (!dataStore.days.length) return today;
  // keep insertion order; default to the last saved day
  return dataStore.days[dataStore.days.length - 1].date || today;
}

function syncDateList() {
  dateList.innerHTML = '';
  const seen = new Set();
  (dataStore.days || []).forEach(rec => {
    const d = rec?.date;
    if (!d || seen.has(d)) return;
    seen.add(d);
    const opt = document.createElement('option');
    opt.value = d;
    dateList.appendChild(opt);
  });
}

function getDayRecord(date) {
  const d = normalizeDayKey(date);
  if (!d) return null;
  return (dataStore.days || []).find(x => x.date === d) || null;
}

function ensureDayRecord(date) {
  const d = normalizeDayKey(date);
  if (!d) return null;
  let rec = getDayRecord(d);
  if (rec) return rec;
  rec = { date: d, expenses: [], members: [] };
  dataStore.days.push(rec);
  syncDateList();
  return rec;
}

function loadDayToUI(date) {
  const d = normalizeDayKey(date);
  if (!d) return;

  const rec = getDayRecord(d);
  if (!rec) {
    // New date not in JSON yet: show empty UI
    clearTablesOnly();
    playerCount.value = 0;
    return;
  }

  applyDataToUI({ expenses: rec.expenses, members: rec.members });
}

function normalizeVietnamese(str) {
  return (str || '')
    .toString()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim()
    .toLowerCase();
}

function typeKeyFromAny(typeValue) {
  const raw = (typeValue || '').toString();
  if (raw === 'San' || raw === 'Cau' || raw === 'Tea' || raw === 'Other') return raw;

  const t = normalizeVietnamese(raw);
  if (t.includes('san')) return 'San';
  if (t.includes('cau')) return 'Cau';
  if (t.includes('tra')) return 'Tea';
  return 'Other';
}

function clearTablesOnly() {
  while (expenseTable.rows.length > 1) expenseTable.deleteRow(1);
  while (memberTable.rows.length > 1) memberTable.deleteRow(1);
}

function addExpenseRow(typeKey, price = 0, quantity = 0, total = 0) {
  const row = expenseTable.insertRow();
  row.dataset.type = typeKey;
  row.innerHTML = `
    <td>${label(typeKey)}</td>
    <td><input type="number" value="${Number(price) || 0}" style="width:100%"></td>
    <td><input type="number" value="${Number(quantity) || 0}" style="width:100%"></td>
    <td class="total">${Number(total) || 0}</td>
    <td><button onclick="removeRow(this)">x</button></td>
  `;
}

function addMemberRow(member) {
  const name = member?.name ?? '---';
  const hours = Number(member?.hours ?? 1) || 1;
  const join = (member?.join ?? 'Y') === 'N' ? 'N' : 'Y';
  const extra = Number(member?.extra ?? 0) || 0;

  const computed = member?.computed ?? {};
  const san = Number(computed?.san ?? 0) || 0;
  const cau = Number(computed?.cau ?? 0) || 0;
  const tea = Number(computed?.tea ?? 0) || 0;
  const other = Number(computed?.other ?? 0) || 0;
  const sum = Number(computed?.sum ?? 0) || 0;

  const row = memberTable.insertRow();
  row.innerHTML = `
    <td>${name}</td>
    <td>${hours}</td>
    <td>${join}</td>
    <td class="san">${san}</td>
    <td class="cau">${cau}</td>
    <td class="tea">${tea}</td>
    <td class="other">${other}</td>
    <td><input type="number" value="${extra}" class="extra"></td>
    <td class="sum">${sum}</td>
    <td><button onclick="removeMember(this)">x</button></td>
  `;
}

function applyDataToUI(data) {
  if (!data || typeof data !== 'object') return;

  const expensesData = Array.isArray(data.expenses) ? data.expenses : [];
  const membersData = Array.isArray(data.members) ? data.members : [];

  clearTablesOnly();

  expensesData.forEach(e => {
    const typeKey = typeKeyFromAny(e?.type);
    addExpenseRow(typeKey, e?.price, e?.quantity, e?.total);
  });

  membersData.forEach(m => addMemberRow(m));

  playerCount.value = membersData.length;
}

function safeNumberFromText(text) {
  const n = Number((text ?? '').toString().replace(/,/g, '').trim());
  return Number.isFinite(n) ? n : 0;
}

function collectDataFromUI() {
  const expensesOut = [...expenseTable.rows]
    .slice(1)
    .map(r => {
      const typeKey = r.dataset.type;
      const price = Number(r.cells[1].querySelector('input')?.value ?? 0) || 0;
      const quantity = Number(r.cells[2].querySelector('input')?.value ?? 0) || 0;
      const total = safeNumberFromText(r.querySelector('.total')?.textContent);

      return {
        type: label(typeKey),
        price,
        quantity,
        total
      };
    });

  const membersOut = [...memberTable.rows]
    .slice(1)
    .map(r => {
      const name = r.cells[0]?.textContent ?? '---';
      const hours = safeNumberFromText(r.cells[1]?.textContent);
      const join = (r.cells[2]?.textContent ?? 'Y') === 'N' ? 'N' : 'Y';
      const extra = Number(r.querySelector('.extra')?.value ?? 0) || 0;

      const san = safeNumberFromText(r.querySelector('.san')?.textContent);
      const cau = safeNumberFromText(r.querySelector('.cau')?.textContent);
      const tea = safeNumberFromText(r.querySelector('.tea')?.textContent);
      const other = safeNumberFromText(r.querySelector('.other')?.textContent);
      const sum = safeNumberFromText(r.querySelector('.sum')?.textContent);

      return {
        name,
        hours: hours || 1,
        join,
        extra,
        computed: {
          san,
          cau,
          tea,
          other,
          incurred: extra,
          sum
        }
      };
    });

  // Giữ đúng cấu trúc file data.json: chỉ có expenses và members
  return {
    expenses: expensesOut,
    members: membersOut
  };
}

function collectAndUpsertCurrentDay() {
  const selected = normalizeDayKey(calcDate.value);
  if (!selected) throw new Error('Bạn chưa nhập Ngày.');

  const rec = ensureDayRecord(selected);
  const payload = collectDataFromUI();
  rec.expenses = payload.expenses;
  rec.members = payload.members;
  return { days: dataStore.days };
}

function downloadJson(data, filename = 'data.json') {
  const text = JSON.stringify(data, null, '\t');
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function ensureJsonFileHandle() {
  if (jsonFileHandle) return jsonFileHandle;
  if (!window.showSaveFilePicker) return null;

  jsonFileHandle = await window.showSaveFilePicker({
    suggestedName: 'data.json',
    types: [
      {
        description: 'JSON',
        accept: { 'application/json': ['.json'] }
      }
    ]
  });

  return jsonFileHandle;
}

async function persistDataJson(data) {
  // Ưu tiên ghi lên server (Apache/PHP) nếu có.
  try {
    const isHttp = location.protocol === 'http:' || location.protocol === 'https:';
    if (isHttp) {
      const res = await fetch(SAVE_ENDPOINT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        const text = await res.text();
        let payload;
        try {
          payload = JSON.parse(text);
        } catch {
          throw new Error('save.php không trả JSON hợp lệ (có thể PHP chưa được bật trên server).');
        }

        if (payload?.ok !== true) throw new Error(payload?.error || 'Save failed');
        return;
      }
    }

    // File System Access API chỉ hoạt động tốt trên https/localhost.
    const handle = await ensureJsonFileHandle();
    if (!handle) {
      downloadJson(data);
      return;
    }

    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(data, null, '\t'));
    await writable.close();
  } catch (err) {
    // Nếu user bấm Cancel hoặc trình duyệt chặn, fallback sang download.
    console.warn('Không ghi trực tiếp được data.json, fallback download.', err);
    downloadJson(data);
  }
}

async function completeCalculation() {
  calcExpenses();

  const store = collectAndUpsertCurrentDay();
  await persistDataJson(store);
}

async function clearAllData() {
  const selected = normalizeDayKey(calcDate.value);

  // Clear expense rows (keep header)
  while (expenseTable.rows.length > 1) {
    expenseTable.deleteRow(1);
  }

  // Clear member rows (keep header)
  while (memberTable.rows.length > 1) {
    memberTable.deleteRow(1);
  }

  // Reset inputs / UI
  newName.value = '';
  newJoin.value = 'Y';
  itemType.value = 'San';
  playerCount.value = 0;

  // Remove the selected day from JSON entirely (keep other days)
  if (selected) {
    dataStore.days = (dataStore.days || []).filter(d => d?.date !== selected);
    syncDateList();
  }

  await persistDataJson({ days: dataStore.days });
}

function addExpense() {
  const type = itemType.value;
  addExpenseRow(type, 0, 0, 0);
}

function removeRow(btn) {
  btn.closest('tr').remove();
}

function label(t) {
  return t === 'San' ? 'Sân' : t === 'Cau' ? 'Cầu' : t === 'Tea' ? 'Trà đá' : 'Khác';
}

function calcExpenses() {
  let sum = { San:0, Cau:0, Tea:0, Other:0 };

  [...expenseTable.rows].slice(1).forEach(r => {
    const price = +r.cells[1].querySelector('input').value;
    const qty = +r.cells[2].querySelector('input').value;
    let total = 0;

    if (r.dataset.type === 'Cau') total = price / 12 * qty;
    else total = price * qty;

    r.querySelector('.total').textContent = total.toFixed(0);
    sum[r.dataset.type] += total;
  });

  updateMembers(sum);
}

function addMember() {
  const name = newName.value || '---';
  const join = newJoin.value;

  addMemberRow({
    name,
    hours: 1,
    join,
    extra: 0,
    computed: { san: 0, cau: 0, tea: 0, other: 0, incurred: 0, sum: 0 }
  });

  newName.value = '';
}
function removeMember(btn) {
  btn.closest('tr').remove();
}

function getSums() {
  let s = { San:0, Cau:0, Tea:0, Other:0 };
  [...expenseTable.rows].slice(1).forEach(r => s[r.dataset.type] += +r.querySelector('.total').textContent);
  return s;
}
function getPlayerCount() {
  return memberTable.rows.length - 1; // trừ header
}
function updateMembers(sum) {
  const playerCountValue = getPlayerCount();
  playerCount.value = playerCountValue; // chỉ cập nhật khi bấm Hoàn thành

  const playersDenom = playerCountValue || 1;
  const sanEach = sum.San / playersDenom;

  const activePlayers =
    [...memberTable.rows]
      .slice(1)
      .filter(r => r.cells[2].textContent === 'Y')
      .length || 1;

  [...memberTable.rows].slice(1).forEach(r => {
    const join = r.cells[2].textContent;

    r.querySelector('.san').textContent = sanEach.toFixed(0);
    r.querySelector('.cau').textContent = join === 'Y' ? (sum.Cau / activePlayers).toFixed(0) : 0;
    r.querySelector('.tea').textContent = join === 'Y' ? (sum.Tea / activePlayers).toFixed(0) : 0;
    r.querySelector('.other').textContent = join === 'Y' ? (sum.Other / activePlayers).toFixed(0) : 0;

    const extra = +r.querySelector('.extra').value;
    const total =
      sanEach +
      (join === 'Y'
        ? sum.Cau / activePlayers + sum.Tea / activePlayers + sum.Other / activePlayers
        : 0) +
      extra;

    r.querySelector('.sum').textContent = total.toFixed(0);
  });
}

</script>

</body>
</html>
